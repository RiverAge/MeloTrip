name: Release Multi Platform

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-multi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0-0.2.pre"
          channel: beta
          cache: true
          cache-key: flutter-${{ runner.os }}-3.41.0-0.2.pre

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          cache-write-only: false
          gradle-home-cache-includes: |
            caches
            notifications
            wrapper

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Android signing files
        run: |
          mkdir -p android/app/keystore
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\r\n' | base64 -d > android/app/keystore/melotrip-release.jks
          cat > android/key.properties <<EOF
          storeFile=keystore/melotrip-release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release APKs (split by ABI)
        run: flutter build apk --release --split-per-abi

      - name: Prepare primary APK for updater metadata
        shell: bash
        run: |
          set -euo pipefail
          cp "build/app/outputs/flutter-apk/app-arm64-v8a-release.apk" \
             "build/app/outputs/flutter-apk/app-release.apk"

      - name: Generate release metadata block
        shell: bash
        run: |
          set -euo pipefail

          apk_path="build/app/outputs/flutter-apk/app-release.apk"
          app_version="$(awk '/^version:/{print $2; exit}' pubspec.yaml | tr -d '\r')"
          version_core="${app_version%%+*}"
          build_number="0"
          if [[ "$app_version" == *"+"* ]]; then
            build_number="${app_version#*+}"
          fi

          sha256="$(sha256sum "$apk_path" | awk '{print $1}')"
          size="$(stat -c%s "$apk_path")"

          cat > release-body.md <<EOF
          <!-- METADATA
          Version: ${version_core}
          Build: ${build_number}
          SHA256: ${sha256}
          Size: ${size}
          METADATA -->
          EOF

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            build/app/outputs/flutter-apk/*.apk
            release-body.md

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0-0.2.pre"
          channel: beta
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release
      - name: Pack Windows bundle
        shell: pwsh
        run: |
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "melotrip-windows-x64.zip"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: melotrip-windows-x64.zip

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0-0.2.pre"
          channel: beta
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Pack Linux bundle
        shell: bash
        run: |
          tar -C build/linux/x64/release -czf melotrip-linux-x64.tar.gz bundle

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: melotrip-linux-x64.tar.gz

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0-0.2.pre"
          channel: beta
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Pack macOS app bundle
        shell: bash
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../melotrip-macos.zip MeloTrip.app

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: melotrip-macos.zip

  publish-release:
    needs:
      - build-android
      - build-windows
      - build-linux
      - build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect files
        shell: bash
        run: |
          mkdir -p release-files
          find dist -type f -name "*.apk" -exec cp {} release-files/ \;
          find dist -type f -name "*.zip" -exec cp {} release-files/ \;
          find dist -type f -name "*.tar.gz" -exec cp {} release-files/ \;

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          body_path: dist/android-artifacts/release-body.md
          generate_release_notes: true
