name: Release APK

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0-0.2.pre"
          channel: beta
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-cache-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-cache-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Android signing files
        run: |
          mkdir -p android/app/keystore
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\r\n' | base64 -d > android/app/keystore/melotrip-release.jks
          cat > android/key.properties <<EOF
          storeFile=keystore/melotrip-release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Generate release metadata block
        shell: bash
        run: |
          set -euo pipefail

          apk_path="build/app/outputs/flutter-apk/app-release.apk"
          app_version="$(awk '/^version:/{print $2; exit}' pubspec.yaml | tr -d '\r')"
          version_core="${app_version%%+*}"
          build_number="0"
          if [[ "$app_version" == *"+"* ]]; then
            build_number="${app_version#*+}"
          fi

          sha256="$(sha256sum "$apk_path" | awk '{print $1}')"
          size="$(stat -c%s "$apk_path")"

          cat > release-body.md <<EOF
          <!-- METADATA
          Version: ${version_core}
          Build: ${build_number}
          SHA256: ${sha256}
          Size: ${size}
          METADATA -->
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          body_path: release-body.md
          generate_release_notes: true
