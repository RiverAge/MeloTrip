name: Release Multi Platform

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-multi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0-0.2.pre"
          channel: beta
          cache: true
          cache-key: flutter-${{ runner.os }}-3.41.0-0.2.pre

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          cache-write-only: false
          gradle-home-cache-includes: |
            caches
            notifications
            wrapper

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Android signing files
        run: |
          mkdir -p android/app/keystore
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\r\n' | base64 -d > android/app/keystore/melotrip-release.jks
          cat > android/key.properties <<EOF
          storeFile=keystore/melotrip-release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release APKs
        shell: bash
        run: |
          set -euo pipefail
          flutter build apk --release
          cp "build/app/outputs/flutter-apk/app-release.apk" \
             "${RUNNER_TEMP}/app-release.apk"
          flutter build apk --release --split-per-abi
          cp "${RUNNER_TEMP}/app-release.apk" \
             "build/app/outputs/flutter-apk/app-release.apk"

      - name: Generate Android metadata fragment
        shell: bash
        run: |
          set -euo pipefail

          apk_path="build/app/outputs/flutter-apk/app-release.apk"
          app_version="$(awk '/^version:/{print $2; exit}' pubspec.yaml | tr -d '\r')"
          version_core="${app_version%%+*}"
          build_number="0"
          if [[ "$app_version" == *"+"* ]]; then
            build_number="${app_version#*+}"
          fi
          aapt_path="$(find "${ANDROID_HOME}/build-tools" -name aapt -type f | sort -V | tail -n 1)"
          apk_version_code="$("${aapt_path}" dump badging "$apk_path" | sed -n "s/.*versionCode='\([^']*\)'.*/\1/p")"
          if [[ -z "$apk_version_code" ]]; then
            apk_version_code="${build_number}"
          fi

          sha256="$(sha256sum "$apk_path" | awk '{print $1}')"
          size="$(stat -c%s "$apk_path")"

          cat > android-metadata.txt <<EOF
          versionName=${version_core}
          versionCode=${apk_version_code}
          asset.android.apk=app-release.apk
          versionCode.android.apk=${apk_version_code}
          sha256.android.apk=${sha256}
          size.android.apk=${size}
          EOF

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            build/app/outputs/flutter-apk/*.apk
            android-metadata.txt

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0-0.2.pre"
          channel: beta
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Pack Windows bundle
        shell: pwsh
        run: |
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "melotrip-windows-x64.zip"

      - name: Generate Windows metadata fragment
        shell: bash
        run: |
          set -euo pipefail
          sha256="$(sha256sum melotrip-windows-x64.zip | awk '{print $1}')"
          size="$(stat -c%s melotrip-windows-x64.zip)"

          cat > windows-metadata.txt <<EOF
          asset.windows.zip=melotrip-windows-x64.zip
          sha256.windows.zip=${sha256}
          size.windows.zip=${size}
          EOF

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            melotrip-windows-x64.zip
            windows-metadata.txt

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0-0.2.pre"
          channel: beta
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Pack Linux bundle
        shell: bash
        run: |
          tar -C build/linux/x64/release -czf melotrip-linux-x64.tar.gz bundle

      - name: Generate Linux metadata fragment
        shell: bash
        run: |
          set -euo pipefail
          sha256="$(sha256sum melotrip-linux-x64.tar.gz | awk '{print $1}')"
          size="$(stat -c%s melotrip-linux-x64.tar.gz)"

          cat > linux-metadata.txt <<EOF
          asset.linux.tar.gz=melotrip-linux-x64.tar.gz
          sha256.linux.tar.gz=${sha256}
          size.linux.tar.gz=${size}
          EOF

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            melotrip-linux-x64.tar.gz
            linux-metadata.txt

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0-0.2.pre"
          channel: beta
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Pack macOS app bundle
        shell: bash
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../melotrip-macos.zip MeloTrip.app

      - name: Generate macOS metadata fragment
        shell: bash
        run: |
          set -euo pipefail
          sha256="$(shasum -a 256 melotrip-macos.zip | awk '{print $1}')"
          size="$(stat -f%z melotrip-macos.zip)"

          cat > macos-metadata.txt <<EOF
          asset.macos.zip=melotrip-macos.zip
          sha256.macos.zip=${sha256}
          size.macos.zip=${size}
          EOF

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            melotrip-macos.zip
            macos-metadata.txt

  publish-release:
    needs:
      - build-android
      - build-windows
      - build-linux
      - build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect files
        shell: bash
        run: |
          mkdir -p release-files
          find dist -type f -name "*.apk" -exec cp {} release-files/ \;
          find dist -type f -name "*.zip" -exec cp {} release-files/ \;
          find dist -type f -name "*.tar.gz" -exec cp {} release-files/ \;

      - name: Generate release body with metadata
        shell: bash
        run: |
          set -euo pipefail

          # Collect metadata fragments
          android_meta="$(cat dist/android-artifacts/android-metadata.txt 2>/dev/null || true)"
          windows_meta="$(cat dist/windows-artifacts/windows-metadata.txt 2>/dev/null || true)"
          linux_meta="$(cat dist/linux-artifacts/linux-metadata.txt 2>/dev/null || true)"
          macos_meta="$(cat dist/macos-artifacts/macos-metadata.txt 2>/dev/null || true)"

          # Extract version info from Android metadata (authoritative source)
          versionName="$(echo "$android_meta" | grep '^versionName=' | cut -d= -f2)"
          versionCode="$(echo "$android_meta" | grep '^versionCode=' | cut -d= -f2)"

          # Build the metadata block
          cat > release-body.md <<EOF
          <!-- MELOTRIP_UPDATE_METADATA
          versionName=${versionName}
          versionCode=${versionCode}
          ${android_meta}
          ${windows_meta}
          ${linux_meta}
          ${macos_meta}
          MELOTRIP_UPDATE_METADATA -->

          ## What's Changed

          EOF

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          fragments = [
              Path("dist/android-artifacts/android-metadata.txt"),
              Path("dist/windows-artifacts/windows-metadata.txt"),
              Path("dist/linux-artifacts/linux-metadata.txt"),
              Path("dist/macos-artifacts/macos-metadata.txt"),
          ]
          metadata = {}
          for path in fragments:
              if not path.exists():
                  continue
              for raw_line in path.read_text(encoding="utf-8").splitlines():
                  line = raw_line.strip()
                  if not line or "=" not in line:
                      continue
                  key, value = line.split("=", 1)
                  metadata[key] = value

          repository = os.environ["GITHUB_REPOSITORY"]
          tag_name = os.environ["GITHUB_REF_NAME"]
          version_name = metadata["versionName"]
          version_code = int(metadata["versionCode"])
          platforms = {}

          for key, asset_name in metadata.items():
              if not key.startswith("asset."):
                  continue
              platform_key = key[len("asset."):]
              platform, package_type = platform_key.split(".", 1)
              platforms[platform] = {
                  "packageType": package_type,
                  "assetName": asset_name,
                  "downloadUrl": (
                      f"https://github.com/{repository}/releases/download/"
                      f"{tag_name}/{asset_name}"
                  ),
              }

          for key, value in metadata.items():
              if key.startswith("sha256."):
                  platform_key = key[len("sha256."):]
                  platform, _ = platform_key.split(".", 1)
                  platforms.setdefault(platform, {})["sha256"] = value
              elif key.startswith("size."):
                  platform_key = key[len("size."):]
                  platform, _ = platform_key.split(".", 1)
                  platforms.setdefault(platform, {})["fileSize"] = int(value)
              elif key.startswith("versionCode."):
                  platform_key = key[len("versionCode."):]
                  platform, _ = platform_key.split(".", 1)
                  platforms.setdefault(platform, {})["versionCode"] = int(value)

          manifest = {
              "schemaVersion": 1,
              "repository": repository,
              "tagName": tag_name,
              "releasePageUrl": (
                  f"https://github.com/{repository}/releases/tag/{tag_name}"
              ),
              "versionName": version_name,
              "versionCode": version_code,
              "changelog": "",
              "platforms": platforms,
          }

          output = Path("release-files/update.json")
          output.write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          body_path: release-body.md
          generate_release_notes: true
