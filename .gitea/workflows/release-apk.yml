name: Release APK (Gitea)

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cirruslabs/flutter:beta

    env:
      APK_PATH: build/app/outputs/flutter-apk/app-release.apk
      PUB_HOSTED_URL: https://pub.flutter-io.cn
      FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Use Gradle mirror
        run: |
          sed -i "s/services.gradle.org\\/distributions/mirrors.cloud.tencent.com\\/gradle/g" android/gradle/wrapper/gradle-wrapper.properties
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle <<'EOF'
          def urlMappings = [
            "https://repo.maven.apache.org/maven2": "https://mirrors.tencent.com/nexus/repository/maven-public/",
            "https://dl.google.com/dl/android/maven2": "https://mirrors.tencent.com/nexus/repository/maven-public/",
            "https://plugins.gradle.org/m2": "https://mirrors.tencent.com/nexus/repository/gradle-plugins/"
          ]

          def enableMirror = { RepositoryHandler repos ->
            repos.all { repo ->
              if (repo instanceof MavenArtifactRepository) {
                def originalUrl = repo.url.toString().replaceAll('/$', '')
                def mirrored = urlMappings[originalUrl]
                if (mirrored != null) {
                  logger.lifecycle("Repository[${repo.url}] is mirrored to ${mirrored}")
                  repo.setUrl(mirrored)
                }
              }
            }
          }

          gradle.allprojects { p ->
            p.buildscript {
              repositories { enableMirror(delegate) }
            }
            p.repositories { enableMirror(delegate) }
          }

          settingsEvaluated { s ->
            enableMirror(s.pluginManagement.repositories)
            if (s.hasProperty("dependencyResolutionManagement")) {
              enableMirror(s.dependencyResolutionManagement.repositories)
            }
          }
          EOF

      - name: Prepare Android signing files
        run: |
          mkdir -p android/app/keystore
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\r\n' | base64 -d > android/app/keystore/melotrip-release.jks
          cat > android/key.properties <<EOF
          storeFile=keystore/melotrip-release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Generate release metadata block
        shell: bash
        run: |
          set -euo pipefail
          app_version="$(awk '/^version:/{print $2; exit}' pubspec.yaml | tr -d '\r')"
          version_core="${app_version%%+*}"
          build_number="0"
          if [[ "$app_version" == *"+"* ]]; then
            build_number="${app_version#*+}"
          fi
          sha256="$(sha256sum "$APK_PATH" | awk '{print $1}')"
          size="$(stat -c%s "$APK_PATH")"

          cat > release-body.md <<EOF
          <!-- METADATA
          Version: ${version_core}
          Build: ${build_number}
          SHA256: ${sha256}
          Size: ${size}
          METADATA -->
          EOF

      - name: Create/Update Gitea Release and Upload APK
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${GITEA_TOKEN:-}" ]]; then
            echo "Missing secret: GITEA_TOKEN"
            exit 1
          fi

          api_url="${GITEA_API_URL:-${GITHUB_API_URL:-}}"
          repo="${GITHUB_REPOSITORY:-${GITEA_REPOSITORY:-}}"
          tag="${GITHUB_REF_NAME:-${GITEA_REF_NAME:-}}"

          if [[ -z "${api_url}" || -z "${repo}" ]]; then
            echo "Missing required env vars: API URL or repository"
            exit 1
          fi

          if [[ -z "${tag}" ]]; then
            tag="$(git tag --points-at HEAD | head -n1)"
          fi
          if [[ -z "${tag}" ]]; then
            echo "Unable to determine tag name"
            exit 1
          fi

          release_body="$(cat release-body.md)"
          release_name="${tag}"

          release_json="$(curl -fsS \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Accept: application/json" \
            "${api_url}/repos/${repo}/releases/tags/${tag}" || true)"

          if [[ -n "${release_json}" ]]; then
            release_id="$(python3 -c "import json,sys; print(json.loads(sys.stdin.read())['id'])" <<< "${release_json}")"
            curl -fsS -X PATCH \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$(python3 -c "import json,sys; print(json.dumps({'name': sys.argv[1], 'body': sys.argv[2], 'draft': False, 'prerelease': False}))" "${release_name}" "${release_body}")" \
              "${api_url}/repos/${repo}/releases/${release_id}" >/dev/null
          else
            created="$(curl -fsS -X POST \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$(python3 -c "import json,sys; print(json.dumps({'tag_name': sys.argv[1], 'name': sys.argv[1], 'body': sys.argv[2], 'draft': False, 'prerelease': False}))" "${tag}" "${release_body}")" \
              "${api_url}/repos/${repo}/releases")"
            release_id="$(python3 -c "import json,sys; print(json.loads(sys.stdin.read())['id'])" <<< "${created}")"
          fi

          asset_name="$(basename "$APK_PATH")"
          assets_json="$(curl -fsS \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Accept: application/json" \
            "${api_url}/repos/${repo}/releases/${release_id}/assets")"
          asset_id="$(python3 -c "import json,sys; a=json.loads(sys.stdin.read()); m=[x['id'] for x in a if x.get('name')==sys.argv[1]]; print(m[0] if m else '')" "${asset_name}" <<< "${assets_json}")"
          if [[ -n "${asset_id}" ]]; then
            curl -fsS -X DELETE \
              -H "Authorization: token ${GITEA_TOKEN}" \
              "${api_url}/repos/${repo}/releases/${release_id}/assets/${asset_id}" >/dev/null
          fi

          curl -fsS -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"${APK_PATH}" \
            "${api_url}/repos/${repo}/releases/${release_id}/assets?name=${asset_name}" >/dev/null
