name: update_installer
description: Local plugin for Android package install flow used by MeloTrip.
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  path: ^1.9.0

flutter:
  plugin:
    platforms:
      android:
        package: com.meme.update_installer
        pluginClass: UpdateInstallerPlugin