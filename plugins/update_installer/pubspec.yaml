name: update_installer
description: Local plugin for Android and Windows update install flow used by MeloTrip.
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.meme.update_installer
        pluginClass: UpdateInstallerPlugin
      windows:
        pluginClass: UpdateInstallerPluginCApi