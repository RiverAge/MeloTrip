name: desktop_lyrics_publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Validate tag equals pubspec version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION_LINE="$(grep '^version:' pubspec.yaml | head -n1 | sed 's/version:[[:space:]]*//')"
          VERSION="${VERSION_LINE%%+*}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match pubspec version $VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Publish to pub.dev
        run: dart pub publish --force
