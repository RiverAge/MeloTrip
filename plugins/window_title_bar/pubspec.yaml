name: window_title_bar
description: Local desktop plugin for custom window title bar controls.
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.10.0-0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: WindowTitleBarPluginCApi
      linux:
        pluginClass: WindowTitleBarPlugin
      macos:
        pluginClass: WindowTitleBarPlugin
